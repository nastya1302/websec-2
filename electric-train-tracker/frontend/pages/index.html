<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Электрички — расписание пригородных поездов</title>
    <link rel="stylesheet" href="/static/styles/main.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">    
    <script src="https://api-maps.yandex.ru/2.1/?apikey=1e419459-c07e-4a53-a7b3-4711cced4e12&lang=ru_RU"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1><i class="fas fa-train"></i> Электрички</h1>
            <p class="subtitle">Расписание пригородных поездов</p>
        </header>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="map">🗺️ Карта</button>
            <button class="tab-btn" data-tab="station">🚉 Станция</button>
            <button class="tab-btn" data-tab="route">🔄 Маршрут</button>
            <button class="tab-btn" data-tab="favorites">⭐ Избранное</button>
        </div>
        
        <div id="map-tab" class="tab-content active">
            <div class="card">
                <h3><i class="fas fa-map-marked-alt"></i> Выберите станцию на карте</h3>
                <p class="hint">Нажмите в любом месте карты, чтобы найти ближайшие ЖД станции</p>
                <div class="map-buttons">
                    <button id="find-my-location" class="map-btn">
                        <i class="fas fa-location-dot"></i> Моё местоположение
                    </button>
                </div>
                <div id="map" class="map-container"></div>
                <div id="selected-station-info" class="selected-info" style="display:none;">
                    <strong>📍 Ближайшие станции:</strong>
                    <div id="nearby-stations-list"></div>
                </div>
            </div>
        </div>
        
        <div id="station-tab" class="tab-content">
            <div class="card">
                <div class="input-group">
                    <label><i class="fas fa-train"></i> Станция:</label>
                    <input type="text" id="station-input" placeholder="Введите название станции">
                    <div id="station-suggestions" class="suggestions"></div>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-calendar"></i> Дата:</label>
                    <input type="date" id="station-date" class="date-input">
                </div>
                <button id="search-station-btn" class="btn-primary">🔍 Показать расписание</button>
            </div>
            <div class="card">
                <h3><i class="fas fa-fire"></i> Популярные станции</h3>
                <div id="popular-list" class="popular-list"></div>
            </div>
        </div>
        
        <div id="route-tab" class="tab-content">
            <div class="card">
                <div class="input-group">
                    <label><i class="fas fa-map-marker-alt"></i> Откуда:</label>
                    <input type="text" id="from-input" placeholder="Станция отправления">
                    <div id="from-suggestions" class="suggestions"></div>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-flag-checkered"></i> Куда:</label>
                    <input type="text" id="to-input" placeholder="Станция назначения">
                    <div id="to-suggestions" class="suggestions"></div>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-calendar"></i> Дата:</label>
                    <input type="date" id="route-date" class="date-input">
                </div>
                <button id="search-route-btn" class="btn-primary">🔍 Найти маршрут</button>
            </div>
        </div>
        
        <div id="favorites-tab" class="tab-content">
            <div class="card">
                <h3><i class="fas fa-heart"></i> Любимые станции</h3>
                <div id="favorites-list" class="favorites-list">
                    <p class="empty-message">⭐ Нет избранных станций</p>
                </div>
            </div>
        </div>
        
        <div id="results" class="results-container" style="display:none;">
            <div class="results-header">
                <h3><i class="fas fa-list"></i> Расписание</h3>
                <span id="results-count"></span>
            </div>
            <div id="schedule-list"></div>
        </div>
    </div>

    <script src="/static/scripts/app.js"></script>
</body>
</html>
